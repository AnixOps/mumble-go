name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -ldflags="-s -w" -o dist/mumble-sdkd-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/mumble-sdkd
          go build -ldflags="-s -w" -o dist/mumble-connect-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/connect
          go build -ldflags="-s -w" -o dist/audio-bot-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/audio_bot
          go build -ldflags="-s -w" -o dist/stream-demo-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/stream_demo
          go build -ldflags="-s -w" -o dist/sdk-demo-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/sdk_demo
          go build -ldflags="-s -w" -o dist/testbot-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/testbot

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mumble-linux-${{ matrix.goarch }}
          path: dist/*
          retention-days: 30

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    strategy:
      matrix:
        goos: [windows]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        shell: bash
        run: |
          mkdir -p dist
          go build -ldflags="-s -w" -o dist/mumble-sdkd-${{ matrix.goos }}-${{ matrix.goarch }}.exe ./cmd/mumble-sdkd
          go build -ldflags="-s -w" -o dist/mumble-connect-${{ matrix.goos }}-${{ matrix.goarch }}.exe ./cmd/connect
          go build -ldflags="-s -w" -o dist/audio-bot-${{ matrix.goos }}-${{ matrix.goarch }}.exe ./cmd/audio_bot
          go build -ldflags="-s -w" -o dist/stream-demo-${{ matrix.goos }}-${{ matrix.goarch }}.exe ./cmd/stream_demo
          go build -ldflags="-s -w" -o dist/sdk-demo-${{ matrix.goos }}-${{ matrix.goarch }}.exe ./cmd/sdk_demo
          go build -ldflags="-s -w" -o dist/testbot-${{ matrix.goos }}-${{ matrix.goarch }}.exe ./cmd/testbot
          # Build Windows GUI
          go build -ldflags="-s -w" -o dist/mumble-gui-${{ matrix.goos }}-${{ matrix.goarch }}.exe ./cmd/mumble-gui

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mumble-windows-${{ matrix.goarch }}
          path: dist/*
          retention-days: 30

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux amd64
        uses: actions/download-artifact@v4
        with:
          name: mumble-linux-amd64
          path: dist/linux-amd64

      - name: Download Linux arm64
        uses: actions/download-artifact@v4
        with:
          name: mumble-linux-arm64
          path: dist/linux-arm64

      - name: Download Windows amd64
        uses: actions/download-artifact@v4
        with:
          name: mumble-windows-amd64
          path: dist/windows-amd64

      - name: Download Windows arm64
        uses: actions/download-artifact@v4
        with:
          name: mumble-windows-arm64
          path: dist/windows-arm64

      - name: Create Checksums
        run: |
          cd dist
          find . -type f -exec sha256sum {} \; > SHA256SUMS.txt

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
