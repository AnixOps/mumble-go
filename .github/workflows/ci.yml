name: CI

on:
  push:
    branches: [main, master, pymumble_py3]
  pull_request:
    branches: [main, master, pymumble_py3]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -v -race $(go list ./... | grep -v /integration)

      - name: Build
        run: go build ./...

  test-windows:
    name: Test (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Test
        run: go test -v $(go list ./... | grep -v /integration)

      - name: Build
        run: go build ./...
